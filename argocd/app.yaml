apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tee-time-notifier
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/juddrollins/tee-time-notifier
    targetRevision: main
    path: k8s
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: argo

  syncPolicy:
    automated:
      prune: true      # remove resources deleted from git
      selfHeal: true   # revert manual cluster changes
    syncOptions:
      - CreateNamespace=true
