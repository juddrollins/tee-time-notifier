apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: tee-time-cron
  namespace: {{ .Values.namespace }}
spec:
  schedule: {{ .Values.schedule | quote }}
  timezone: {{ .Values.timezone | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 0

  workflowSpec:
    entrypoint: main

    templates:

      - name: main
        dag:
          tasks:
            - name: fetch
              template: fetch-tee-times

            - name: compare
              template: compare-tee-times
              dependencies: [fetch]

            - name: notify
              template: notify-new-times
              dependencies: [compare]

      - name: fetch-tee-times
        container:
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node"]
          args: ["dist/fetch/index.js"]
          env:
            - name: COURSE_ID
              value: {{ .Values.course.id | quote }}
            - name: PLAYERS
              value: {{ .Values.course.players | quote }}
            - name: HOLES
              value: {{ .Values.course.holes | quote }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_TOKEN
            - name: GITHUB_OWNER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_OWNER
            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_REPO

      - name: compare-tee-times
        container:
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node"]
          args: ["dist/compare/index.js"]
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_TOKEN
            - name: GITHUB_OWNER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_OWNER
            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_REPO

      - name: notify-new-times
        container:
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node"]
          args: ["dist/notify/index.js"]
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_TOKEN
            - name: GITHUB_OWNER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_REPO
            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: GITHUB_REPO
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: SMTP_PASS
            - name: NOTIFY_EMAILS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: NOTIFY_EMAILS
