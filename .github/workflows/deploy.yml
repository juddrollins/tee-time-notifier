name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest changes
        run: git -C ~/tee-time-notifier pull origin main

      - name: Install dependencies
        run: npm --prefix ~/tee-time-notifier install

      - name: Build
        run: npm --prefix ~/tee-time-notifier run build

      - name: Confirm
        run: echo "Deploy complete at $(date)"
