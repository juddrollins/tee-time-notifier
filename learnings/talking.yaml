apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: hello-
  namespace: argo
spec:
  entrypoint: main  # points to the DAG template below

  templates:

    # The DAG orchestrator — defines the steps and their dependencies
    - name: main
      dag:
        tasks:
          - name: generate
            template: generate-message

          - name: consume
            template: print-message
            dependencies: [generate]  # waits for generate to finish
            arguments:
              parameters:
                - name: message
                  # reference the output from the generate task
                  value: "{{tasks.generate.outputs.parameters.message}}"

    # Step 1: writes a message to a file — Argo captures it as an output parameter
    - name: generate-message
      container:
        image: alpine:3.19
        command: [sh, -c]
        args: ["echo 'Hello from step 1!' > /tmp/message.txt"]
      outputs:
        parameters:
          - name: message
            valueFrom:
              path: /tmp/message.txt  # Argo reads this file after the container exits

    # Step 2: receives the message as an input parameter and prints it
    - name: print-message
      inputs:
        parameters:
          - name: message
      container:
        image: alpine:3.19
        command: [sh, -c]
        args: ["echo 'Step 2 received: {{inputs.parameters.message}}'"]
