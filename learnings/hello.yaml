apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: hello-  # each run gets a unique name like hello-x4kf2
  namespace: argo
spec:
  entrypoint: say-hello  # which template to run first

  templates:
    - name: say-hello
      container:
        image: alpine:3.19
        command: [echo]
        args: ["Hello from Argo Workflows!"]
