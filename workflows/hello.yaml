apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: tee-time-cron
  namespace: argo
spec:
  schedule: "*/20 * * * *"   # every 20 minutes
  timezone: "America/New_York"
  concurrencyPolicy: Forbid   # skip run if previous is still running
  startingDeadlineSeconds: 0

  workflowSpec:
    entrypoint: main

    volumes:
      - name: workdir
        persistentVolumeClaim:
          claimName: tee-time-data

    templates:

      - name: main
        dag:
          tasks:
            - name: fetch
              template: fetch-tee-times

      - name: fetch-tee-times
        container:
          image: tee-time-notifier:latest
          imagePullPolicy: Never
          command: ["node"]
          args: ["dist/fetch/index.js"]
          env:
            - name: OUTPUT_DIR
              value: /workdir
            - name: COURSE_ID
              value: "16503"
            - name: PLAYERS
              value: "4"
            - name: HOLES
              value: "18"
          volumeMounts:
            - name: workdir
              mountPath: /workdir
